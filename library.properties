name=UngulaMotor
version=2.0.3
author=Alex Conesa <alexconesap@gmail.com>
maintainer=Alex Conesa <alexconesap@gmail.com>
sentence=High-performance embedded C++ libraries for ESP32, STM32 and other MCUs: stepper motor control with autonomous ISR motion and 12-state FSM.
paragraph=Embedded C++17 stepper motion. LocalMotor runs off an ESP32 GPTimer ISR with acceleration ramps, a 12-state MotorFsm, debounced limit switches, stall detection and an event publisher. Drivers include a modern Tmc2209 (UART + DIAG stall) and a legacy basic_motor HAL kept for RBB1/RBB2. RemoteMotor is a proxy over a transport. Supported targets: ESP32 only — the ISR step generator uses ESP32 GPTimer. STM32 and other MCUs would need a timer backend port.
category=Device Control
url=https://github.com/alexconesap/ungula-motor.git
includes=ungula_motor.h
depends=UngulaCore,UngulaHal,EmblogX
architectures=esp32
