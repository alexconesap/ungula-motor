name=UngulaMotor
version=1.3.1
author=Alex Conesa <alexconesap@gmail.com>
maintainer=Alex Conesa <alexconesap@gmail.com>
sentence=Embedded C++17 motor / axis control library. Black-box MotorAxis hides chip jargon behind human-readable verbs (moveForward, moveBy, home, stop) and behaviour intents (Quiet, HighTorque, AdaptiveCurrent).
paragraph=High-level MotorAxis abstraction with strong-typed units (Speed/Distance/Acceleration accept RPM, mm/s, degrees, steps and convert internally to SPS). Composable MotorIntent flags route to driver-specific implementations (StealthChop/SpreadCycle/CoolStep on TMC2209, etc.) without leaking chip terminology into application code. Pluggable interfaces (IMotorDriver, IDeviceTransport, IStepSignalGenerator, IMotionPlanner, ILimitSystem, IHomingStrategy) let a new motor driver be added in a single header+source pair. Stage 1 ships the skeleton + ESP32 GPTimer-based step signal generator + the limit / homing systems carried over from v2. Concrete drivers (TMC2209, YPMC, RMD-CAN, generic STEP/DIR) follow in Stages 2-4.
category=Device Control
url=https://github.com/alexconesap/ungula-motor.git
includes=ungula_motor.h
depends=UngulaCore,UngulaHal
architectures=esp32
