name=UngulaMotor
version=3.1.4
author=Alex Conesa <alexconesap@gmail.com>
maintainer=Alex Conesa <alexconesap@gmail.com>
sentence=Embedded C++17 motion control: portable Axis abstraction over open-loop stepper, STEP/DIR servo, and CAN servo drives.
paragraph=The Axis facade owns a MotionPlanner, a HAL-backed pulse engine (or CAN transport), a homing controller, sensor-aware limits, and a bounded event queue. Pulse generation runs autonomously off a lib_hal hardware timer + ISR — slow main loops, UART diagnostics, logging, and listeners never disturb step timing. TMC2209 stepper config is split from diagnostics and stall-guard so motion timing is never blocked on UART. STEP/DIR servos and CAN servos share the same Axis facade. Targets ESP32 today via lib_hal's ESP32 backend; STM32 and other MCUs port through lib_hal.
category=Device Control
url=https://github.com/alexconesap/ungula-motor.git
includes=ungula_motor.h
depends=UngulaCore,UngulaHal
architectures=esp32
